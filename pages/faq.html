<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="DevERP FAQ — Answers to common questions about our ERP platform, modules, pricing, and implementation.">
  <title>FAQ | DevERP</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⬡</text></svg>">
</head>
<body>

  <div id="nav-placeholder"></div>

  <!-- Page Header -->
  <div id="page-header"></div>

  <!-- Search -->
  <section style="padding: 2rem 0 0;">
    <div class="container">
      <div id="search-section"></div>
    </div>
  </section>

  <!-- FAQ List -->
  <section style="padding: 2rem 0 5rem;">
    <div class="container" style="max-width: 860px;">
      <div id="faq-list"></div>
    </div>
  </section>

  <!-- CTA -->
  <section style="background: var(--bg-2); padding: 5rem 0;">
    <div class="container">
      <div class="cta-section reveal">
        <div class="section-eyebrow">Still have questions?</div>
        <h2>Can't find what you're looking for?</h2>
        <p>Our team is ready to answer any specific questions about your use case.</p>
        <div class="cta-actions">
          <a href="contact.html" class="btn btn-primary btn-lg">Contact Us</a>
          <button class="btn btn-outline btn-lg" id="openChatFaq">Chat with DevAI →</button>
        </div>
      </div>
    </div>
  </section>

  <div id="footer-placeholder"></div>
  <!-- <div id="chatbot-placeholder"></div> -->

  <script src="../js/data.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/main.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("openChatFaq")?.addEventListener("click", () => {
        document.getElementById("chatbotFab")?.click();
      });
    });
  </script>
</body>
</html>
